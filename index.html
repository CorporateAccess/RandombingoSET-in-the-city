<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:Arial,sans-serif;
    overflow:hidden;
    height:100vh;
    color:#fff;
    background:
        radial-gradient(circle at 80% 20%, rgba(0,150,255,.45), transparent 35%),
        linear-gradient(135deg,#06224a 0%,#0b4f8f 45%,#061d3d 100%);
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        linear-gradient(120deg,transparent 0%,transparent 45%,rgba(255,255,255,.08) 45%,rgba(255,255,255,.08) 58%,transparent 58%),
        linear-gradient(rgba(255,255,255,.08) 1px,transparent 1px);
    background-size:100% 100%,100% 70px;
    opacity:.6;
    pointer-events:none;
}

.header{
    height:118px;
    padding:18px 34px;
    display:flex;
    align-items:center;
    position:relative;
    z-index:5;
}

.set-line{font-size:34px;font-weight:900;color:#fff;}
.city-line{font-size:54px;font-weight:900;color:#fff;}
.year{color:#ff9f00;}

.main{
    display:flex;
    height:calc(100vh - 118px);
    padding:0 34px 34px;
    gap:28px;
    position:relative;
    z-index:2;
}

.sidebar{
    width:330px;
    border-radius:28px;
    overflow:hidden;
    background:rgba(255,255,255,.12);
    border:3px solid rgba(255,255,255,.35);
    box-shadow:0 20px 40px rgba(0,0,0,.25);
    backdrop-filter:blur(6px);
    display:flex;
    flex-direction:column;
}

.out-header{
    background:#ff9f00;
    color:#06224a;
    padding:22px;
    text-align:center;
    font-size:48px;
    font-weight:900;
}

.out-list{
    flex:1;
    overflow-y:auto;
    background:rgba(255,255,255,.92);
}

.out-item{
    display:flex;
    align-items:center;
    gap:18px;
    padding:14px 20px;
    border-bottom:1px solid rgba(0,0,0,.08);
    font-size:28px;
    font-weight:900;
    color:#06224a;
}

.out-number{
    color:#ff9f00;
    min-width:52px;
}

.center{
    flex:1;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    border-radius:30px;
}

.track{
    position:absolute;
    inset:auto 0 0 0;
    height:42%;
    background:linear-gradient(rgba(255,255,255,.15) 2px,transparent 2px);
    background-size:100% 54px;
    opacity:.6;
}

.bars{
    position:absolute;
    bottom:80px;
    right:70px;
    display:flex;
    align-items:flex-end;
    gap:18px;
    opacity:.38;
}

.bar{width:50px;background:rgba(255,255,255,.7);}
.bar:nth-child(1){height:90px;}
.bar:nth-child(2){height:140px;}
.bar:nth-child(3){height:115px;}
.bar:nth-child(4){height:180px;}
.bar:nth-child(5){height:260px;}
.bar:nth-child(6){height:320px;}

.arrow-line{
    position:absolute;
    left:6%;
    bottom:18%;
    width:60%;
    height:6px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.55));
    transform:rotate(-18deg);
    border-radius:999px;
}

.board{
    width:860px;
    text-align:center;
    position:relative;
    z-index:5;
}

.theme-head{
    font-size:58px;
    font-weight:900;
    line-height:1.05;
    margin-bottom:22px;
    text-shadow:0 8px 24px rgba(0,0,0,.28);
}

.theme-head span{color:#ff9f00;}

.board-top{
    display:inline-block;
    background:#ff9f00;
    color:#06224a;
    padding:14px 44px;
    border-radius:999px;
    font-size:30px;
    font-weight:900;
    margin-bottom:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.word-box{
    min-height:380px;
    border-radius:36px;
    background:rgba(255,255,255,.94);
    border:6px solid #ff9f00;
    box-shadow:0 24px 60px rgba(0,0,0,.35), inset 0 0 40px rgba(255,255,255,.9);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
    padding:24px;
}

.word-box::before{
    content:"";
    position:absolute;
    inset:-40%;
    background:radial-gradient(circle,rgba(255,159,0,.22),transparent 55%);
    animation:shine 5s linear infinite;
}

@keyframes shine{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.stock-info{
    position:relative;
    z-index:3;
    text-align:center;
}

.word{
    color:#06224a;
    font-size:145px;
    font-weight:900;
    text-shadow:0 4px 0 #ff9f00,0 12px 28px rgba(0,0,0,.22);
}

.company-name{
    color:#06224a;
    font-size:34px;
    font-weight:900;
    margin-top:10px;
    line-height:1.3;
}

.company-desc{
    color:#444;
    font-size:25px;
    font-weight:700;
    line-height:1.5;
    margin-top:14px;
    max-width:760px;
}

.pop{animation:pop .12s linear;}

@keyframes pop{
    0%{transform:scale(1);}
    50%{transform:scale(1.13);}
    100%{transform:scale(1);}
}

.button-wrap{
    margin-top:28px;
    display:flex;
    gap:22px;
    justify-content:center;
    flex-wrap:wrap;
}

button{
    border:none;
    padding:20px 86px;
    border-radius:999px;
    background:#ff9f00;
    color:#06224a;
    font-size:48px;
    font-weight:900;
    cursor:pointer;
    box-shadow:0 10px 0 #c77700,0 18px 35px rgba(0,0,0,.28);
    transition:.15s;
}

button:hover{transform:translateY(-4px);}
button:active{transform:translateY(2px);}
button:disabled{opacity:.6;cursor:not-allowed;}

.reset-btn{
    background:#ffffff !important;
    color:#0b2c5f !important;
    box-shadow:0 10px 0 #d0d0d0,0 18px 35px rgba(0,0,0,.18) !important;
}

canvas{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:999;
}

@media(max-width:900px){
    body{overflow:auto;}
    .main{flex-direction:column;height:auto;}
    .sidebar{width:100%;height:260px;}
    .word{font-size:82px;}
    .theme-head{font-size:38px;}
    .company-name{font-size:24px;}
    .company-desc{font-size:20px;}
    button{font-size:30px;padding:16px 44px;}
}
</style>
</head>

let remaining = [...stocks];
let used = [];

function draw(){

    if(remaining.length === 0){
        alert("หมดแล้วทุกบริษัท!");
        return;
    }

    const btn = document.getElementById('btn');
    const display = document.getElementById('current');
    const companyName = document.getElementById('companyName');
    const companyDesc = document.getElementById('companyDesc');

    btn.disabled = true;
    companyName.innerText = "";
    companyDesc.innerText = "";

    let spinCount = 0;

    const spin = setInterval(()=>{

        const randomStock = remaining[Math.floor(Math.random()*remaining.length)];

        display.innerText = randomStock.code;

        display.classList.remove('pop');
        void display.offsetWidth;
        display.classList.add('pop');

        spinCount++;

        if(spinCount > 24){

            clearInterval(spin);

            const index = Math.floor(Math.random()*remaining.length);
            const picked = remaining.splice(index,1)[0];

            used.push(picked);

            display.innerText = picked.code;
            companyName.innerText = picked.name;
            companyDesc.innerText = picked.desc;

            renderHistory();
            launchConfetti();

            btn.disabled = false;
        }

    },80);
}

function resetGame(){

    remaining = [...stocks];
    used = [];

    document.getElementById('current').innerText = '-';
    document.getElementById('companyName').innerText = '';
    document.getElementById('companyDesc').innerText = '';
    document.getElementById('history').innerHTML = '';

    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces = [];

    if(confettiAnimation){
        cancelAnimationFrame(confettiAnimation);
        confettiAnimation = null;
    }

    document.getElementById('btn').disabled = false;
}

function renderHistory(){

    const history = document.getElementById('history');

    history.innerHTML = used.map((w,i)=>`
        <div class="out-item">
            <div class="out-number">${String(i+1).padStart(2,'0')}</div>
            <div>${w.code}</div>
        </div>
    `).join('');
}

const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();
window.addEventListener('resize',resize);

let pieces = [];
let confettiAnimation = null;

function launchConfetti(){

    pieces = [];
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if(confettiAnimation){
        cancelAnimationFrame(confettiAnimation);
        confettiAnimation = null;
    }

    for(let i=0;i<160;i++){

        const colors = ["#ff9f00","#ffffff","#39a8ff","#0b4f8f"];

        pieces.push({
            x:canvas.width/2,
            y:canvas.height/2,
            vx:(Math.random()-.5)*15,
            vy:(Math.random()-.8)*15,
            size:Math.random()*8+4,
            life:70,
            color:colors[Math.floor(Math.random()*colors.length)]
        });
    }

    animateConfetti();
}

function animateConfetti(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    pieces.forEach(p=>{
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.28;
        p.life--;

        ctx.fillStyle = p.color;
        ctx.fillRect(p.x,p.y,p.size,p.size);
    });

    pieces = pieces.filter(p=>p.life>0);

    if(pieces.length > 0){
        confettiAnimation = requestAnimationFrame(animateConfetti);
    }else{
        ctx.clearRect(0,0,canvas.width,canvas.height);
        confettiAnimation = null;
    }
}
</script>
